# Multi-arch Docker build template (amd64 + arm64).
#
# Usage :
#   include:
#     - project: 'mirador1/mirador-shared'
#       ref: main
#       file: 'ci-templates/docker-multiarch.yml'
#
# Override variables in consumer to customize :
#   variables:
#     PLATFORMS: "linux/amd64"  # arm64 not needed for this consumer

docker-multiarch:
  stage: package
  image: docker:28
  tags:
    - macbook-local
  variables:
    PLATFORMS: "linux/amd64,linux/arm64"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker run --privileged --rm tonistiigi/binfmt --install all || true
    - docker buildx create --name multi --use 2>/dev/null || docker buildx use multi
  script:
    - |
      docker buildx build \
        --platform "$PLATFORMS" \
        --tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" \
        --tag "$CI_REGISTRY_IMAGE:latest" \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --label "org.opencontainers.image.source=$CI_PROJECT_URL" \
        --cache-from "type=registry,ref=$CI_REGISTRY_IMAGE:cache" \
        --cache-to "type=registry,ref=$CI_REGISTRY_IMAGE:cache,mode=max" \
        --push \
        .
