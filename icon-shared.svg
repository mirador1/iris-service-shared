<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- mirador-service-shared (cross-cutting infra) — GREY/SLATE variant
       for visual neutrality.  Watchtower silhouette mirrors the
       mirador-service-java + mirador-ui + mirador-service-python logos
       for visual sibling identity ; the grey colour signals "infra /
       cross-cutting / not application code". -->
  <rect width="32" height="32" rx="7" fill="#000000"/>
  <rect x="2" y="2" width="28" height="28" rx="5.5" fill="#ffffff"/>
  <!-- Tower body -->
  <rect x="13" y="17" width="6" height="11" rx="0.5" fill="#000000" opacity="0.9"/>
  <!-- Tower platform -->
  <rect x="11" y="15" width="10" height="2" rx="0.5" fill="#000000"/>
  <!-- Battlements (3 merlons) -->
  <rect x="11" y="13" width="2" height="2" rx="0.3" fill="#000000"/>
  <rect x="14.5" y="13" width="2" height="2" rx="0.3" fill="#000000"/>
  <rect x="18" y="13" width="2" height="2" rx="0.3" fill="#000000"/>
  <!-- Window -->
  <ellipse cx="16" cy="20" rx="1.5" ry="1.2" fill="#ffffff" stroke="#000000" stroke-width="0.5"/>
  <circle cx="16" cy="20" r="0.5" fill="#1f2937" opacity="0.9"/>
  <!-- Binoculars -->
  <circle cx="14" cy="16" r="0.8" fill="none" stroke="#000000" stroke-width="0.5"/>
  <circle cx="18" cy="16" r="0.8" fill="none" stroke="#000000" stroke-width="0.5"/>
  <!-- Radar arcs (lighter slate accent) -->
  <path d="M 22 12 A 3.5 3.5 0 0 1 25.5 15.5" stroke="#9ca3af" stroke-width="0.7" fill="none" opacity="0.9"/>
  <path d="M 22 10 A 5.5 5.5 0 0 1 27.5 15.5" stroke="#9ca3af" stroke-width="0.55" fill="none" opacity="0.6"/>
  <!-- Signal dot -->
  <circle cx="23.5" cy="12.5" r="0.7" fill="#9ca3af" opacity="0.95"/>
</svg>
