<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- mirador1 group icon — multicolor watchtower combining the 4 sibling
       icon palettes : Java green (#6DB33F), UI red (#DD0031),
       Python blue (#3776AB), Shared black (#000000).
       The 3 battlements + the radar = 4 elements, each painted in one
       sibling colour to signal "this is the group containing all four". -->
  <rect width="32" height="32" rx="7" fill="#000000"/>
  <rect x="2" y="2" width="28" height="28" rx="5.5" fill="#ffffff"/>
  <!-- Tower body : Shared black (the foundation that supports the others) -->
  <rect x="13" y="17" width="6" height="11" rx="0.5" fill="#000000" opacity="0.9"/>
  <!-- Tower platform -->
  <rect x="11" y="15" width="10" height="2" rx="0.5" fill="#000000"/>
  <!-- Battlements (3 merlons) — Java green / Angular red / Python blue -->
  <rect x="11" y="13" width="2" height="2" rx="0.3" fill="#6DB33F"/>
  <rect x="14.5" y="13" width="2" height="2" rx="0.3" fill="#DD0031"/>
  <rect x="18" y="13" width="2" height="2" rx="0.3" fill="#3776AB"/>
  <!-- Window -->
  <ellipse cx="16" cy="20" rx="1.5" ry="1.2" fill="#ffffff" stroke="#000000" stroke-width="0.5"/>
  <circle cx="16" cy="20" r="0.5" fill="#1f2937" opacity="0.9"/>
  <!-- Binoculars (one Java-green eye, one Python-blue eye — observability symmetry) -->
  <circle cx="14" cy="16" r="0.8" fill="none" stroke="#6DB33F" stroke-width="0.6"/>
  <circle cx="18" cy="16" r="0.8" fill="none" stroke="#3776AB" stroke-width="0.6"/>
  <!-- Radar arcs : 3 colours stacked — green (Java), red (Angular UI), blue (Python) -->
  <path d="M 22 12 A 3.5 3.5 0 0 1 25.5 15.5" stroke="#6DB33F" stroke-width="0.7" fill="none" opacity="0.95"/>
  <path d="M 22 10 A 5.5 5.5 0 0 1 27.5 15.5" stroke="#DD0031" stroke-width="0.55" fill="none" opacity="0.7"/>
  <path d="M 22 8 A 7.5 7.5 0 0 1 29.5 15.5" stroke="#3776AB" stroke-width="0.45" fill="none" opacity="0.55"/>
  <!-- Signal dot : black (shared) — the source from which everything radiates -->
  <circle cx="23.5" cy="12.5" r="0.7" fill="#000000" opacity="0.95"/>
</svg>
