# =============================================================================
# SecretStore — tells External Secrets Operator where to read secrets from.
#
# Two SecretStore instances, one per target namespace. Both point at the same
# Google Secret Manager project using Workload Identity Federation (no JSON key
# on the cluster — see ADR-0007 + ADR-0016).
#
# The `external-secrets` K8s SA in the `external-secrets` namespace carries the
# Workload Identity annotation (linked to the GCP service account
# external-secrets-operator@...). GSM access is granted per-secret.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: app
spec:
  provider:
    gcpsm:
      projectID: project-8d6ea68c-33ac-412b-8aa
      # No explicit auth block: the operator runs as the annotated K8s SA
      # and GKE Workload Identity resolves it to the GCP service account.
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: infra
spec:
  provider:
    gcpsm:
      projectID: project-8d6ea68c-33ac-412b-8aa
