# =============================================================================
# deploy/kubernetes/observability-prom/mirador-drift-alerts.yaml
#
# Prometheus recording + alerting rules for the Customer Churn drift SLO
# (Phase E of shared ADR-0061). Mirrors the pattern of mirador-alerts.yaml.
#
# The drift signal comes from bin/ml/compute_drift.py running as a daily
# CronJob (see ml-drift-cronjob.yaml in the same directory). The script
# pushes one Prometheus gauge per feature to the Pushgateway :
#
#   mirador_churn_drift_ks_stat{feature, model}
#
# This file defines :
#
# 1. Recording rules — pre-aggregate the max-across-features KS-stat per
#    model so the SLO + Grafana dashboards evaluate quickly.
# 2. SLO recording rules — Sloth-style "good count" / "total count" so
#    burn-rate alerts work cleanly with the same multi-window pattern as
#    the availability + latency SLOs (per ADR-0058 §"Multi-window
#    multi-burn-rate").
# 3. Alert rules — 4-tier multi-window/burn-rate per ADR-0058 plus a
#    standalone "freshness" alert that fires when the CronJob hasn't
#    pushed in > 36 h (twice the daily cadence).
#
# Labels follow the kube-prometheus-stack convention so the operator's
# ruleSelector picks these up : `release: prometheus-stack` + `role: alert-rules`.
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mirador-drift-alerts
  labels:
    release: prometheus-stack
    role: alert-rules
    app.kubernetes.io/part-of: mirador
    app.kubernetes.io/component: ml-drift
spec:
  groups:
    # ─────────────────────────────────────────────────────────────────────
    # Recording rules — pre-aggregate KS-stat across features.
    # ─────────────────────────────────────────────────────────────────────
    - name: mirador.churn.drift.recording
      interval: 30s
      rules:
        - record: mirador:churn_drift:ks_stat:max
          # max across the 8 features per model — the model "drifts" as
          # soon as ONE feature crosses the threshold (per ADR-0061 §6).
          expr: |
            max by (model) (mirador_churn_drift_ks_stat)

        - record: mirador:churn_drift:ks_stat:p95
          # Useful as a "general drift" signal without false-firing on a
          # single noisy feature.
          expr: |
            quantile by (model) (0.95, mirador_churn_drift_ks_stat)

        - record: mirador:churn_drift:freshness_seconds
          # Time since last drift push. The CronJob runs daily ; values
          # > 86 400 mean we missed at least one run.
          expr: |
            time() - mirador_churn_drift_ks_stat_created

    # ─────────────────────────────────────────────────────────────────────
    # SLO recording rules — Sloth-style "drift-below-threshold success rate"
    # ─────────────────────────────────────────────────────────────────────
    #
    # "Good" sample = drift below 0.20 ; "Bad" sample = ≥ 0.20.
    # Over 30 days, we expect ≥ 99 % of samples to be "good"
    # (≤ 7 h of cumulative breach per month — realistic given the
    # CronJob runs daily, not minutely).
    - name: mirador.churn.drift.slo
      interval: 1m
      rules:
        - record: slo:sli_error:ratio_rate5m{slo="churn-drift"}
          expr: |
            (
              count(mirador:churn_drift:ks_stat:max >= 0.20) or vector(0)
            )
            /
            count(mirador:churn_drift:ks_stat:max)
          labels:
            slo: churn-drift

        - record: slo:sli_error:ratio_rate1h{slo="churn-drift"}
          expr: |
            avg_over_time(slo:sli_error:ratio_rate5m{slo="churn-drift"}[1h])

        - record: slo:sli_error:ratio_rate6h{slo="churn-drift"}
          expr: |
            avg_over_time(slo:sli_error:ratio_rate5m{slo="churn-drift"}[6h])

        - record: slo:sli_error:ratio_rate1d{slo="churn-drift"}
          expr: |
            avg_over_time(slo:sli_error:ratio_rate5m{slo="churn-drift"}[1d])

        - record: slo:sli_error:ratio_rate3d{slo="churn-drift"}
          expr: |
            avg_over_time(slo:sli_error:ratio_rate5m{slo="churn-drift"}[3d])

        - record: slo:objective:ratio
          expr: vector(0.99)
          labels:
            slo: churn-drift

    # ─────────────────────────────────────────────────────────────────────
    # Alerts — multi-window multi-burn-rate per ADR-0058
    # ─────────────────────────────────────────────────────────────────────
    - name: mirador.churn.drift.alerts
      rules:
        # Page : 2 % of monthly budget burned in 1 h (fast incident).
        - alert: ChurnDriftBudgetBurnFast
          expr: |
            slo:sli_error:ratio_rate1h{slo="churn-drift"} > (14.4 * (1 - 0.99))
            and
            slo:sli_error:ratio_rate5m{slo="churn-drift"} > (14.4 * (1 - 0.99))
          for: 2m
          labels:
            severity: critical
            slo: churn-drift
            burn_rate: fast
          annotations:
            summary: "Churn model drift fast burn — 2% of 30d budget in 1h"
            description: >
              The Customer Churn model's feature distribution has drifted
              fast enough to consume 2 % of the 30-day error budget in 1 hour.
              Investigate the most-drifted features and decide whether to
              re-train or roll back the model. See runbook for triage steps.
            runbook_url: "https://gitlab.com/mirador1/mirador-service-shared/-/blob/main/docs/ml/drift-slo-runbook.md"

        # Page : 5 % in 6 h (sustained degradation).
        - alert: ChurnDriftBudgetBurnSustained
          expr: |
            slo:sli_error:ratio_rate6h{slo="churn-drift"} > (6 * (1 - 0.99))
            and
            slo:sli_error:ratio_rate5m{slo="churn-drift"} > (6 * (1 - 0.99))
          for: 15m
          labels:
            severity: critical
            slo: churn-drift
            burn_rate: sustained
          annotations:
            summary: "Churn model drift sustained burn — 5% of 30d budget in 6h"
            description: >
              Sustained drift over 6 hours has consumed 5 % of the monthly
              error budget. This is no longer a transient blip — the
              population has shifted relative to the training distribution.
            runbook_url: "https://gitlab.com/mirador1/mirador-service-shared/-/blob/main/docs/ml/drift-slo-runbook.md"

        # Ticket : 10 % in 1 d (deploy-related drift).
        - alert: ChurnDriftSlowErosion
          expr: |
            slo:sli_error:ratio_rate1d{slo="churn-drift"} > (3 * (1 - 0.99))
          for: 1h
          labels:
            severity: warning
            slo: churn-drift
            burn_rate: slow
          annotations:
            summary: "Churn model drift slow erosion — 10% of 30d budget in 1d"
            description: >
              Drift has eroded 10 % of the monthly budget over the last day.
              This often correlates with a code/data deploy ; check the
              recent training runs in MLflow for any change to feature
              engineering or label definition.
            runbook_url: "https://gitlab.com/mirador1/mirador-service-shared/-/blob/main/docs/ml/drift-slo-runbook.md"

        # Ticket : 10 % in 3 d (quiet baseline drift).
        - alert: ChurnDriftBaselineErosion
          expr: |
            slo:sli_error:ratio_rate3d{slo="churn-drift"} > (1 * (1 - 0.99))
          for: 6h
          labels:
            severity: warning
            slo: churn-drift
            burn_rate: baseline
          annotations:
            summary: "Churn model drift baseline erosion — 10% of 30d budget in 3d"
            description: >
              Drift has quietly eroded 10 % of the monthly budget over 3 days.
              Indicates a slow population shift (seasonality, new customer
              segment) — schedule a re-training run in the next sprint.
            runbook_url: "https://gitlab.com/mirador1/mirador-service-shared/-/blob/main/docs/ml/drift-slo-runbook.md"

        # Freshness — ensure the CronJob actually runs.
        - alert: ChurnDriftStaleData
          expr: |
            mirador:churn_drift:freshness_seconds > 129600
          for: 30m
          labels:
            severity: warning
            slo: churn-drift
            class: freshness
          annotations:
            summary: "Churn drift series stale — no CronJob push in > 36h"
            description: >
              The drift CronJob hasn't pushed metrics in over 36 hours
              (twice the daily cadence). The SLO can't be evaluated with
              stale data ; check the CronJob status with `kubectl get
              cronjob -n mirador mirador-churn-drift` and look at the
              latest Job's logs.
            runbook_url: "https://gitlab.com/mirador1/mirador-service-shared/-/blob/main/docs/ml/drift-slo-runbook.md"
